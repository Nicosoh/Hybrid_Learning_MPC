[DATA]
dataset_class = PendulumDataset
log_space = true
data_path = value_iteration/output/2026-05-12_22-49-16_Pendulum_VI/loop_13/data_collection/2026-05-12_23-46-04_Pendulum_logs.npz

[MODEL]
model_name = PendulumModel
load_checkpoint = False
checkpoint_path = 

[TRAINING]
learning_rate = 0.00003
batch_size = 256
num_epochs = 16
patience = 10
min_lr = 0.0000001

[LOSS]
; weight for stationary-point penalty
alpha = 1.0
; stationary point for pendulum (angle=0, angular_velocity=0)
x_s = [0.0, 0.0]
y_s = [0.0]

[VAL]
val_interval = 1