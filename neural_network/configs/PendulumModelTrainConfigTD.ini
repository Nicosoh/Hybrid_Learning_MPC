[DATA]
dataset_class = PendulumDataset_TD
log_space = true
data_path =

[CONFIG_MODEL_NAME]
model_name = Pendulum

[MODEL]
model_name = PendulumModel
target_model_checkpoint_path =
online_model_checkpoint_path =
offline_model_checkpoint_path = 

[TRAINING]
n_step = 5
learning_rate = 0.001
batch_size = 1024
gradient_steps = 5
target_tau = 0.001
target_update_frequency = 2

[LOSS]
; weight for stationary-point penalty
alpha = 0.01
lam = 0.1
p_exp_up = 2.0
p_down = 0.90
ema_mse_tau = 0.05
ema_mse = 0

; stationary point for pendulum (angle=0, angular_velocity=0)
x_s = [0.0, 0.0]
y_s = [0.0]